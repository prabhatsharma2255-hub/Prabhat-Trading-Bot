services:
  - type: web
    name: trading-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_all.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DELTA_API_KEY
        sync: false
      - key: DELTA_API_SECRET
        sync: false
      - key: NEWSAPI_KEY
        sync: false
